fairagro-advanced-middleware-api-chart:
  config:
    log_level: INFO
    known_rdis:
      - bonares
      - edal
      - edaphobase
      - openagrar
      - publisso
      - thunen_atlas
    git_repo:
      url: https://datahub-dev.ipk-gatersleben.de
      group: FAIRagro-advanced-middleware-dev
      max_workers: 4
    celery: {}  # all further celery config is set via environment variables
    otel:
      endpoint: http://signoz-otel-collector.monitoring.svc.fizz.cluster:4318
      log_level: DEBUG

  rabbitmq:
    image: rabbitmq:4.2.2

  couchdb:
    image: couchdb:3.3
    persistence:
      enabled: true
      size: 5Gi

  api:
    image:
      repository: zalf/fairagro-advanced-middleware-api
      tag: 8.4.8-couchdb-step2-v3-api.2
    ingress:
      enabled: true
      mtlsEnabled: true
      mtlsVerifyDepth: 3
      className: nginx-external
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 32m
        cert-manager.io/issuer: letsencrypt
        cert-manager.io/private-key-size: "4096"
        cert-manager.io/private-key-rotation-policy: "Always"
        # It seems the subjects annotations do not have any effect.
        # Still we keep them...
        cert-manager.io/subject-countries: "DE"
        cert-manager.io/subject-organizations: "NFDI FAIRagro"
        cert-manager.io/subject-organizationalunits: "Measure 4.2"
      hosts:
        - host: middleware.fairagro.net
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: server-tls
          hosts:
            - middleware.fairagro.net

  celery:
    image:
      repository: zalf/fairagro-advanced-middleware-api
      tag: 8.4.8-couchdb-step2-v3-api.2
    worker:
      replicaCount: 2
      concurrency: 2
      persistence:
        size: 4Gi # for temporary files during processing
