apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fairagro-advanced-middleware-harvester
  namespace: fairagro-m42-applications
spec:
  project: fairagro-m42
  source:
    repoURL: https://github.com/fairagro/m4.2_infrastructure.git
    path: helmcharts/fairagro-advanced-middleware-harvester
    targetRevision: "{{.Values.advanced_middleware_harvester_revision}}"
    helm:
      valueFiles:
        - ../../environments/{{ .Values.cluster_name }}/values/fairagro-advanced-middleware-harvester.yaml
        - ../../environments/{{ .Values.cluster_name }}/values/fairagro-advanced-middleware-harvester.enc.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fairagro-advanced-middleware-harvester
